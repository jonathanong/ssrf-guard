name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: latest
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm exec tsc --noEmit
      - run: pnpm exec oxlint --deny-warnings src
      - run: pnpm exec oxfmt --check
      - run: pnpm test --coverage
      - id: token-check
        if: always() && !cancelled()
        run: echo "has_codecov=${{ secrets.CODECOV_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - name: Upload test results to Codecov
        if: always() && !cancelled() && steps.token-check.outputs.has_codecov == 'true'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: test-results.xml
          report_type: test_results
      - name: Upload coverage to Codecov
        if: always() && !cancelled() && steps.token-check.outputs.has_codecov == 'true'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
